{% extends "base.html" %}
{% block title %}Detalle Alumno{% endblock %}

{% block content %}
<main class="max-w-md mx-auto w-full px-4 py-6 pb-24">
  <h2 class="text-xl font-bold mb-4">Detalle del Alumno</h2>

  <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 space-y-4">
    <div>
      <p class="text-xs text-slate-500 dark:text-slate-400">Nombre</p>
      <p class="font-semibold text-slate-900 dark:text-slate-100">{{ alumno.nombre }}</p>
    </div>

    <div>
      <p class="text-xs text-slate-500 dark:text-slate-400">Apellido</p>
      <p class="font-semibold text-slate-900 dark:text-slate-100">{{ alumno.apellido }}</p>
    </div>

    <div>
      <p class="text-xs text-slate-500 dark:text-slate-400">Edad</p>
      <p class="font-semibold text-slate-900 dark:text-slate-100">{{ alumno.edad }}</p>
    </div>

    <div>
      <p class="text-xs text-slate-500 dark:text-slate-400">Correo</p>
      <p class="font-semibold text-slate-900 dark:text-slate-100">{{ alumno.correo }}</p>
    </div>
  </div>

  <div class="mt-4 flex gap-2">
    <a
      href="{% url 'alumnos:editar_alumno' alumno.pk %}"
      class="flex-1 text-center bg-amber-500 text-white py-2 rounded-lg font-bold"
    >
      Editar
    </a>

    <a
      href="{% url 'alumnos:eliminar_alumno' alumno.pk %}"
      class="flex-1 text-center bg-red-500 text-white py-2 rounded-lg font-bold"
    >
      Eliminar
    </a>
  </div>

  <div class="mt-3">
    <a
      href="{% url 'alumnos:lista_alumnos' %}"
      class="block w-full text-center bg-slate-200 dark:bg-slate-700 text-slate-900 dark:text-slate-100 py-2 rounded-lg font-bold"
    >
      Volver al listado
    </a>
  </div>
</main>
{% endblock %}
